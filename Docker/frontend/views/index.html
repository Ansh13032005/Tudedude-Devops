<!DOCTYPE html>
<html>
<head>
    <title>Submit to Flask</title>
</head>
<body>
    <h1>Submit Name</h1>
    <form id="submitForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <button type="submit">Submit</button>
    </form>
    <p id="responseMessage"></p>

    <script>
        document.getElementById('submitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            
            try {
                // The frontend client sends the request to the backend service.
                const response = await fetch('http://localhost:5000/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: name })
                });
                
                const data = await response.json();
                if (response.ok) {
                    document.getElementById('responseMessage').innerText = data.message;
                } else {
                    document.getElementById('responseMessage').innerText = 'Error: ' + data.error;
                }
            } catch (error) {
                document.getElementById('responseMessage').innerText = 'Error connecting to backend.';
            }
        });
    </script>
</body>
</html>
